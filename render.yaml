services:
  - type: web
    name: bmad-2048
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bmad-2048-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://bmad-2048.onrender.com

databases:
  - name: bmad-2048-db
    plan: free
