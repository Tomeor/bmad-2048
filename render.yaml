services:
  - type: web
    name: test-bmad
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: test-bmad-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://test-bmad.onrender.com

databases:
  - name: test-bmad-db
    plan: free
